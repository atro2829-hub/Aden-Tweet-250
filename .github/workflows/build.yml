name: Build AdenTweet APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias aden_tweet \
            -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -keypass "${{ secrets.SIGNING_KEY_PASSWORD }}" \
            -dname "CN=AdenTweet, OU=Dev, O=AdenTweet, L=Aden, ST=Aden, C=YE"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEYSTORE_PATH: app/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AdenTweet-release
          path: app/build/outputs/apk/release/*.apk